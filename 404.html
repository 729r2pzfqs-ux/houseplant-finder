<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | PlantFinder</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    :root { --primary: #16a34a; --bg: #f0fdf4; --text: #1e293b; --muted: #64748b; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
    h1 { font-size: 5rem; margin-bottom: 1rem; }
    h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    p { color: var(--muted); margin-bottom: 2rem; max-width: 400px; }
    a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .btn { background: var(--primary); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; display: inline-block; }
    .btn:hover { background: #15803d; }
    .links { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <h1>🌿</h1>
  <h2>Page Not Found</h2>
  <p>This plant wandered off! Try searching for your favorite houseplant instead.</p>
  <div class="links">
    <a href="/" class="btn">Go Home</a>
    <a href="/quiz/">Take the Quiz</a>
    <a href="/search/">Search Plants</a>
  </div>
</body>
</html>
