<!DOCTYPE html>
<html lang="es">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

<body class="bg-gradient-to-br from-emerald-50 via-white to-teal-50 min-h-screen text-slate-800">
    <!-- Header -->
    <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="../" class="flex items-center gap-2">
                <svg class="w-8 h-8 text-emerald-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 20h10"/>
                    <path d="M10 20c5.5-2.5.8-6.4 3-10"/>
                    <path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/>
                    <path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/>
                </svg>
                <span class="text-xl font-bold bg-gradient-to-r from-emerald-600 to-teal-600 bg-clip-text text-transparent">PlantFinder</span>
            </a>
            <nav class="flex items-center gap-6 text-sm font-medium">
                <a href="../search/" class="text-slate-600 hover:text-emerald-700 transition">All Plants</a>
                <a href="../quiz/" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white px-5 py-2.5 rounded-xl font-semibold hover:shadow-lg hover:shadow-emerald-500/25 transition">Take Quiz</a>
            <!-- Language selector -->
                <div class="relative group">
                    <button class="flex items-center gap-1 text-slate-600 hover:text-emerald-700 py-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                        <span>ES</span>
                    </button>
                    <div class="absolute right-0 top-full bg-white border border-slate-200 rounded-xl shadow-xl hidden group-hover:block min-w-[140px] py-2 z-50 before:absolute before:h-2 before:-top-2 before:left-0 before:right-0 before:bg-transparent">
                        <a href="/es/" class="block px-4 py-2 hover:bg-slate-100 font-semibold text-emerald-700">English</a>
                        <a href="/es/compare/" class="block px-4 py-2 hover:bg-slate-100 font-semibold text-emerald-700">Español</a>
                        <a href="/de/compare/" class="block px-4 py-2 hover:bg-slate-100 text-slate-600">Deutsch</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4">
                Compare
                <span class="bg-gradient-to-r from-emerald-500 to-teal-600 bg-clip-text text-transparent">Plants</span>
            </h1>
            <p class="text-lg text-slate-600">Selecciona hasta 3 plantas para comparar side by side</p>
        </div>

        <!-- Plant Selectors -->
        <div class="grid md:grid-cols-3 gap-4 mb-10">
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Planta 1</label>
                <select id="plant1" onchange="updateComparison()" class="w-full p-3 rounded-xl border-2 border-slate-200 focus:border-emerald-400 focus:outline-none bg-white">
                    <option value="">Seleccionar planta...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Planta 2</label>
                <select id="plant2" onchange="updateComparison()" class="w-full p-3 rounded-xl border-2 border-slate-200 focus:border-emerald-400 focus:outline-none bg-white">
                    <option value="">Seleccionar planta...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-600 mb-2">Planta 3 (opcional)</label>
                <select id="plant3" onchange="updateComparison()" class="w-full p-3 rounded-xl border-2 border-slate-200 focus:border-emerald-400 focus:outline-none bg-white">
                    <option value="">Seleccionar planta...</option>
                </select>
            </div>
        </div>

        <!-- Comparison Table -->
        <div id="comparison-container" class="hidden">
            <div class="bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden"><div class="overflow-x-auto">
                <table class="w-full min-w-[600px]">
                    <thead id="comparison-header">
                    </thead>
                    <tbody id="comparison-body">
                    </tbody>
                </table>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="text-center py-20">
            <div class="text-6xl mb-4">🪴</div>
            <h3 class="text-xl font-bold text-slate-700 mb-2">Selecciona plantas para comparar</h3>
            <p class="text-slate-600">Elige al menos 2 plantas de las listas arriba</p>
        </div>

        <!-- Comparaciones Populares -->
        <div class="mt-16">
            <h2 class="text-2xl font-bold mb-6">Comparaciones Populares</h2>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                <button onclick="setPlants('pothos-golden', 'philodendron-heartleaf')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Pothos vs Heartleaf Philodendron</span>
                    <p class="text-sm text-slate-600">Similar looks, different care</p>
                </button>
                <button onclick="setPlants('snake-plant', 'zz-plant')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Snake Plant vs ZZ Plant</span>
                    <p class="text-sm text-slate-600">Low maintenance champions</p>
                </button>
                <button onclick="setPlants('monstera-deliciosa', 'fiddle-leaf-fig')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Monstera vs Fiddle Leaf Fig</span>
                    <p class="text-sm text-slate-600">Statement plant showdown</p>
                </button>
                <button onclick="setPlants('peace-lily', 'spider-plant')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Peace Lily vs Spider Plant</span>
                    <p class="text-sm text-slate-600">Air purifying favorites</p>
                </button>
                <button onclick="setPlants('rubber-plant', 'dracaena-marginata')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Rubber Plant vs Dragon Tree</span>
                    <p class="text-sm text-slate-600">Fácil indoor trees</p>
                </button>
                <button onclick="setPlants('calathea-medallion', 'boston-fern')" class="bg-white p-4 rounded-xl shadow-sm hover:shadow-md transition text-left">
                    <span class="font-semibold">Calathea Medallion vs Boston Fern</span>
                    <p class="text-sm text-slate-600">Pet safe beauties</p>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-100 mt-16 py-8">
        <div class="max-w-6xl mx-auto px-4 text-center text-slate-600 text-sm">
            <p>© 2026 PlantFinder. Made with 🌿 for plant lovers everywhere.</p>
        </div>
    </footer>

    <script>
        let plants = [];
        const verifiedImages = new Set([
            'monstera-deliciosa', 'boston-fern', 'pothos-golden', 'aloe-vera',
            'jade-plant', 'bunny-ears-cactus', 'areca-palm', 'haworthia-zebra', 'peace-lily'
        ]);

        // Spanish plant name translations
        const PLANT_NAMES_ES = {
            "monstera-deliciosa": "Costilla de Adán", "pothos-golden": "Pothos Dorado",
            "snake-plant": "Lengua de Suegra", "peace-lily": "Espatifilo",
            "fiddle-leaf-fig": "Ficus Lira", "rubber-plant": "Árbol del Caucho",
            "zz-plant": "Planta ZZ", "spider-plant": "Planta Araña", "boston-fern": "Helecho de Boston",
            "aloe-vera": "Aloe Vera", "philodendron-heartleaf": "Filodendro Hoja de Corazón",
            "chinese-evergreen": "Aglaonema", "jade-plant": "Planta de Jade", "bird-of-paradise": "Ave del Paraíso",
            "parlor-palm": "Palma de Salón", "calathea-medallion": "Calathea Medallón", "string-of-pearls": "Collar de Perlas",
            "pothos-marble-queen": "Pothos Reina de Mármol", "dracaena-marginata": "Dracena Marginata",
            "bamboo-palm": "Palma Bambú", "english-ivy": "Hiedra Inglesa", "prayer-plant": "Planta de la Oración",
            "croton": "Croton", "dieffenbachia": "Diefembaquia", "areca-palm": "Palma Areca",
            "cast-iron-plant": "Aspidistra", "chinese-money-plant": "Planta China del Dinero", "hoya-carnosa": "Flor de Cera",
            "calathea-orbifolia": "Calathea Orbifolia", "birds-nest-fern": "Helecho Nido de Ave", "african-violet": "Violeta Africana",
            "peperomia": "Peperomia", "anthurium": "Anturio", "schefflera": "Cheflera",
            "yucca": "Yuca", "norfolk-island-pine": "Pino de Norfolk", "weeping-fig": "Ficus Benjamina"
        };
        function getPlantNameES(id, fallback) { return PLANT_NAMES_ES[id] || fallback; }
        
        // More Spanish translations
        const CATEGORY_ES = {"foliage": "Follaje", "flowering": "Floración", "succulent": "Suculenta", "palm": "Palma", "fern": "Helecho", "cactus": "Cactus", "vine": "Trepadora", "tree": "Árbol"};
        const SIZE_ES = {"small": "Pequeña", "medium": "Mediana", "large": "Grande", "extra-large": "Muy grande"};
        const DIFFICULTY_ES = {"easy": "Fácil", "moderate": "Moderado", "hard": "Difícil"};
        function getCategoryES(cat) { return CATEGORY_ES[cat?.toLowerCase()] || cat; }
        function getSizeES(size) { return SIZE_ES[size?.toLowerCase()] || size; }
        function getDifficultyES(diff) { return DIFFICULTY_ES[diff?.toLowerCase()] || diff; }

        // Load plants from JSON
        fetch('/data/plants.json')
            .then(r => r.json())
            .then(data => {
                plants = data;
                populateSelects();
            })
            .catch(e => console.error('Failed to load plants:', e));

        function populateSelects() {
            const selects = ['plant1', 'plant2', 'plant3'];
            selects.forEach(id => {
                const select = document.getElementById(id);
                plants.forEach(plant => {
                    const option = document.createElement('option');
                    option.value = plant.id;
                    option.textContent = getPlantNameES(plant.id, plant.name);
                    select.appendChild(option);
                });
            });
        }

        function setPlants(id1, id2, id3 = '') {
            document.getElementById('plant1').value = id1;
            document.getElementById('plant2').value = id2;
            document.getElementById('plant3').value = id3;
            updateComparison();
        }

        function updateComparison() {
            const selected = [
                document.getElementById('plant1').value,
                document.getElementById('plant2').value,
                document.getElementById('plant3').value
            ].filter(v => v);

            if (selected.length < 2) {
                document.getElementById('comparison-container').classList.add('hidden');
                document.getElementById('empty-state').classList.remove('hidden');
                return;
            }

            document.getElementById('comparison-container').classList.remove('hidden');
            document.getElementById('empty-state').classList.add('hidden');

            const selectedPlants = selected.map(id => plants.find(p => p.id === id));
            renderComparison(selectedPlants);
        }

        function renderComparison(selectedPlants) {
            // Header
            const header = document.getElementById('comparison-header');
            header.innerHTML = `
                <tr class="border-b border-slate-100">
                    <th class="p-4 text-left text-slate-600 font-medium w-1/4">Attribute</th>
                    ${selectedPlants.map(plant => {
                        const hasImage = true;
                        const imgHtml = hasImage 
                            ? `<img src="/images/plants/${plant.id}.webp" alt="${getPlantNameES(plant.id, plant.name)}" class="w-full h-full object-cover rounded-xl">`
                            : `<span class="text-3xl">🪴</span>`;
                        return `
                        <th class="p-4 text-center">
                            <a href="../plants/${plant.id}/" class="group">
                                <div class="w-16 h-16 rounded-xl mx-auto mb-2 bg-gradient-to-br from-emerald-100 to-teal-100 flex items-center justify-center overflow-hidden shadow-md group-hover:shadow-lg transition">${imgHtml}</div>
                                <div class="font-bold text-slate-800 group-hover:text-emerald-700 transition">${getPlantNameES(plant.id, plant.name)}</div>
                            </a>
                        </th>`;
                    }).join('')}
                </tr>
            `;

            // Body
            const body = document.getElementById('comparison-body');
            
            const rows = [
                { label: 'Categoría', render: p => getCategoryES(p.category) || '—' },
                { label: 'Tamaño', render: p => getSizeES(p.size) || '—' },
                { label: 'Dificultad', render: p => renderDificultad(p.difficulty) },
                { label: 'Segura para Mascotas', render: p => p.pet_safe ? '<span class="text-emerald-700 font-semibold">✓ Sí</span>' : '<span class="text-rose-600 font-semibold">✗ Tóxica</span>' },
                { label: 'Luz', render: p => renderRating(p.light) },
                { label: 'Agua', render: p => renderRating(p.water) },
                { label: 'Humedad', render: p => renderRating(p.humidity) },
                { label: 'Purifica Aire', render: p => p.air_purifying ? '✓ Sí' : '✗ No' }
            ];

            body.innerHTML = rows.map((row, i) => `
                <tr class="${i % 2 === 0 ? 'bg-slate-50/50' : ''}">
                    <td class="p-4 text-slate-600 font-medium">${row.label}</td>
                    ${selectedPlants.map(plant => `
                        <td class="p-4 text-center text-slate-800">
                            ${row.render(plant)}
                        </td>
                    `).join('')}
                </tr>
            `).join('');
        }

        function renderDificultad(value) {
            const colors = {
                easy: 'bg-emerald-100 text-emerald-700',
                moderate: 'bg-amber-100 text-amber-700',
                hard: 'bg-rose-100 text-rose-700'
            };
            return `<span class="px-2 py-1 rounded-full text-sm font-medium ${colors[value] || 'bg-slate-100 text-slate-600'}">${getDifficultyES(value) || '—'}</span>`;
        }

        function renderRating(value) {
            if (value === undefined) return '—';
            const filled = '●'.repeat(value);
            const empty = '○'.repeat(5 - value);
            const colors = {
                1: 'text-emerald-300',
                2: 'text-emerald-400',
                3: 'text-emerald-500',
                4: 'text-emerald-700',
                5: 'text-emerald-700'
            };
            return `<span class="${colors[value] || 'text-slate-600'}">${filled}</span><span class="text-slate-200">${empty}</span>`;
        }
    </script>

</body>
